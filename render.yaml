services:
  - type: web
    name: peacoo-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: GROQ_API_KEY
        sync: false          # you paste this manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure key
